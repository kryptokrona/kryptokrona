syntax = "proto3";

package node;

message GetNodeDetailsRequest {}

message GetNodeDetailsResponse {
    string daemon_host = 1;
    int32 daemon_port = 2;
    int64 node_fee = 3;
    string node_address = 4;
}

// Node service definition.
service Node {
    rpc GetNodeDetails(GetNodeDetailsRequest) returns (GetNodeDetailsResponse) {}
}
