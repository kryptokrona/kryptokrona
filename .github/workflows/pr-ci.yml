name: Kryptokrona Pull Request Pipeline

on: [pull_request]

jobs:
  build:
    name: "Build: ${{ matrix.config.name }} / ${{ matrix.config.platform }}"
    runs-on: ${{ matrix.config.os }}
    continue-on-error: ${{ matrix.config.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Ubuntu 20.04 GCC",
              artifact: "kryptokrona-ubuntu-20.zip",
              os: ubuntu-20.04,
              cc: "gcc",
              cxx: "g++",
              platform: x64,
            }
          - {
              name: "Ubuntu 22.04 GCC",
              artifact: "kryptokrona-ubuntu-22.zip",
              os: ubuntu-22.04,
              cc: "gcc",
              cxx: "g++",
              platform: x64,
            }
          - {
              name: "macOS arm64 Clang",
              artifact: "kryptokrona-macos-arm64.zip",
              os: macos-14,
              cc: "clang",
              cxx: "clang++",
              platform: arm64,
            }
          - {
              name: "Windows x64 MSVC",
              artifact: "kryptokrona-windows-x64.zip",
              os: windows-2022,
              cc: "cl",
              cxx: "cl",
              platform: x64,
              experimental: true,
            }
    steps:
      - uses: actions/checkout@v4

      - name: "Install ${{ matrix.config.name }} Dependencies "
        if: matrix.config.os == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-dev libboost-all-dev libssl-dev libffi-dev python3-dev gcc g++ git cmake librocksdb-dev cron rpcbind libboost-system1.71.0 libboost-filesystem1.71.0 libboost-thread1.71.0 libboost-date-time1.71.0 libboost-chrono1.71.0 libboost-regex1.71.0 libboost-serialization1.71.0 libboost-program-options1.71.0 libicu66

      - name: "Install ${{ matrix.config.name }} Dependencies "
        if: matrix.config.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-dev libboost-all-dev libssl-dev libffi-dev python3-dev gcc g++ git cmake librocksdb-dev cron rpcbind libboost-system1.74.0 libboost-filesystem1.74.0 libboost-thread1.74.0 libboost-date-time1.74.0 libboost-chrono1.74.0 libboost-regex1.74.0 libboost-serialization1.74.0 libboost-program-options1.74.0 libicu70

      - name: "Install macOS Dependencies"
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost cmake ccache

      - name: Build Ubuntu Target
        if: ${{ contains(matrix.config.name, 'ubuntu') }}
        run: |
          mkdir -p build && cd build
          cmake -DBoost_ARCHITECTURE=-x64 ..
          make -j$(nproc)

      - name: Build macOS Target
        if: runner.os == 'macOS'
        run: |
          mkdir -p build && cd build
          cmake ..
          make -j$(sysctl -n hw.ncpu)

      - name: Install Boost (vcpkg, static)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # GitHub's Windows runners no longer ship a prebuilt Boost, so install
          # it via the preinstalled vcpkg. The x64-windows-static triplet builds
          # Boost with the static /MT runtime that matches the /MT this project
          # forces, and ships BoostConfig.cmake so CMake's config mode finds it.
          #
          # Unlike Homebrew/apt (which install ALL of Boost), vcpkg installs one
          # port per Boost module, so we must list every module the code uses --
          # both the compiled libs (find_package COMPONENTS) and the header-only
          # ones it #includes (uuid, multi_index, variant, ...). vcpkg pulls each
          # module's transitive dependencies automatically.
          vcpkg install --triplet x64-windows-static `
            boost-system boost-filesystem boost-thread boost-date-time `
            boost-chrono boost-serialization boost-program-options `
            boost-multi-index boost-uuid boost-variant boost-optional `
            boost-utility boost-functional boost-scope-exit boost-foreach `
            boost-algorithm boost-range boost-lexical-cast boost-iterator `
            boost-format

      - name: Build Windows Target
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ..
          cmake --build . --config Release -- /m
