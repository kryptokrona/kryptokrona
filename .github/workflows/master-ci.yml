name: Kryptokrona Master Pipeline

env:
  GITHUB_REGISTRY: "ghcr.io"
  GITHUB_OWNER: "kryptokrona"
  GITHUB_DOCKER_IMAGE: "kryptokrona"

on:
  push:
    branches:
      - master

jobs:
  build:
    name: "Build: ${{ matrix.config.name }} / ${{ matrix.config.platform }}"
    runs-on: ${{ matrix.config.os }}
    # The Windows build is still being stabilised, so don't let it fail the
    # whole matrix (it is marked experimental in the config below).
    continue-on-error: ${{ matrix.config.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Ubuntu 22.04 GCC",
              artifact: "kryptokrona-ubuntu-22",
              os: ubuntu-22.04,
              cc: "gcc",
              cxx: "g++",
              platform: x64,
            }
          - {
              name: "macOS arm64 Clang",
              artifact: "kryptokrona-macos-arm64",
              os: macos-14,
              cc: "clang",
              cxx: "clang++",
              platform: arm64,
            }
          - {
              name: "Windows x64 MSVC",
              artifact: "kryptokrona-windows-x64",
              os: windows-2022,
              cc: "cl",
              cxx: "cl",
              platform: x64,
              experimental: true,
            }
    steps:
      - uses: actions/checkout@v4

      - name: "Install ${{ matrix.config.name }} Dependencies "
        if: matrix.config.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-dev libboost-all-dev libssl-dev libffi-dev python3-dev gcc g++ git cmake librocksdb-dev cron rpcbind libboost-system1.74.0 libboost-filesystem1.74.0 libboost-thread1.74.0 libboost-date-time1.74.0 libboost-chrono1.74.0 libboost-regex1.74.0 libboost-serialization1.74.0 libboost-program-options1.74.0 libicu70

      - name: "Install macOS Dependencies"
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install boost cmake ccache

      # ---------------- Ubuntu build ----------------
      - name: Build Ubuntu Target
        if: ${{ contains(matrix.config.name, 'ubuntu') }}
        run: |
          mkdir -p build && cd build
          cmake -DBoost_ARCHITECTURE=-x64 ..
          make -j$(nproc)

      # ---------------- macOS build (Apple Silicon) ----------------
      - name: Build macOS Target
        if: runner.os == 'macOS'
        run: |
          mkdir -p build && cd build
          cmake ..
          make -j$(sysctl -n hw.ncpu)

      # ---------------- macOS code signing + notarization ----------------
      # Signs each binary with a Developer ID certificate (hardened runtime +
      # secure timestamp) and notarizes them with Apple so Gatekeeper stops
      # blocking the downloaded binaries. Skips cleanly if the signing secrets
      # are not configured (e.g. on forks), leaving unsigned binaries.
      - name: Sign and notarize macOS binaries
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ] || [ -z "${APPLE_CERTIFICATE_BASE64:-}" ]; then
            echo "::warning::Apple signing secrets not set — skipping code signing/notarization."
            exit 0
          fi

          BINS="kryptokronad xkrwallet kryptokrona-service miner wallet-api"

          # --- Import the Developer ID cert into a throwaway keychain ---
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          # Add our keychain to the search list without dropping the existing ones
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["]//g')

          # --- Sign each binary (hardened runtime + secure timestamp) ---
          cd build/src
          for b in $BINS; do
            codesign --force --options runtime --timestamp \
              --keychain "$KEYCHAIN" --sign "$APPLE_SIGNING_IDENTITY" "$b"
            codesign --verify --strict --verbose=2 "$b"
          done

          # --- Notarize (notarytool needs an archive; bare executables can't be
          #     stapled, but notarization is recorded against their hashes) ---
          NZIP="$RUNNER_TEMP/notarize.zip"
          /usr/bin/zip -j "$NZIP" $BINS
          xcrun notarytool submit "$NZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # --- Clean up the keychain ---
          security delete-keychain "$KEYCHAIN"
          echo "macOS binaries signed and notarized."

      # ---------------- Windows build (MSVC) ----------------
      - name: Install Boost (vcpkg, static)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # GitHub's Windows runners no longer ship a prebuilt Boost, so install
          # it via the preinstalled vcpkg. The x64-windows-static triplet builds
          # Boost with the static /MT runtime that matches the /MT this project
          # forces, and ships BoostConfig.cmake so CMake's config mode finds it.
          #
          # Unlike Homebrew/apt (which install ALL of Boost), vcpkg installs one
          # port per Boost module, so we must list every module the code uses --
          # both the compiled libs (find_package COMPONENTS) and the header-only
          # ones it #includes (uuid, multi_index, variant, ...). vcpkg pulls each
          # module's transitive dependencies automatically.
          vcpkg install --triplet x64-windows-static `
            boost-system boost-filesystem boost-thread boost-date-time `
            boost-chrono boost-serialization boost-program-options `
            boost-multi-index boost-uuid boost-variant boost-optional `
            boost-utility boost-functional boost-scope-exit boost-foreach `
            boost-algorithm boost-range boost-lexical-cast boost-iterator `
            boost-format

      - name: Build Windows Target
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ..
          cmake --build . --config Release -- /m

      # ---------------- Artifact upload ----------------
      - name: Upload Unix Artifact
        if: runner.os == 'Linux' || runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: |
            build/src/kryptokronad
            build/src/xkrwallet
            build/src/kryptokrona-service
            build/src/miner
            build/src/wallet-api

      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: |
            build/src/Release/kryptokronad.exe
            build/src/Release/xkrwallet.exe
            build/src/Release/kryptokrona-service.exe
            build/src/Release/miner.exe
            build/src/Release/wallet-api.exe

